<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; border: none; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="gasFrame" src=""></iframe>

  <script>
    // ดึงชื่อจาก URL ของ GitHub
    const urlParams = new URLSearchParams(window.location.search);
    const kolName = urlParams.get('name') || '';

    // ใส่ URL ของ Google Apps Script ที่ Deploy ไว้แล้วตรงนี้
    const gasUrl = "https://script.google.com/macros/s/AKfycbx7FTLAFTujj8gHWlFL38rc8mM_T0JiLWfna7Aq4JS5-Nsc-F2WAVSffUNNph2CuoZc/exec";

    // สั่งให้ Iframe โหลดหน้าเว็บ GAS พร้อมส่งชื่อนักไลฟ์ไปด้วย
    document.getElementById('gasFrame').src = gasUrl + "?name=" + encodeURIComponent(kolName);
  </script>
</body>
</html>
